databases:
  - name: learntrack-db
    databaseName: learntrack_db
    user: learntrack_db_user
    plan: free

services:
  - type: web
    name: learntrack-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    envVars:
      - key: DB_HOST
        fromDatabase:
          name: learntrack-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: learntrack-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: learntrack-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: learntrack-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: learntrack-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_AI_OPENAI_BASE_URL
        value: http://localhost:11434
      - key: SPRING_AI_OPENAI_API_KEY
        value: dummy
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        value: copitocorp.soporte@gmail.com
      - key: SPRING_MAIL_PASSWORD
        value: "uglw qpni narq hhya"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
        value: "true"
      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
        value: "true"
