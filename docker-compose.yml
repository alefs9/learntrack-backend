services:
  db:
    image: postgres:16-alpine
    container_name: learntrack-db
    environment:
      - POSTGRES_DB=learntrack_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learntrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: learntrack-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    entrypoint: /bin/sh
    command: >
      -c "
      echo 'Iniciando servidor Ollama...' &&
      ollama serve &
      SERVE_PID=$! &&
      sleep 5 &&
      echo 'Intentando descargar phi3:mini (opcional)...' &&
      ollama pull phi3:mini || echo 'Modelo no disponible, continuando sin el...' &&
      tail -f /dev/null
      "
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: .
    container_name: learntrack-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/learntrack_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_SQL_INIT_MODE=always
      - SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION=true
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=copitocorp.soporte@gmail.com
      - SPRING_MAIL_PASSWORD=uglw qpni narq hhya
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
      - SPRING_AI_OPENAI_BASE_URL=http://ollama:11434
      - SPRING_AI_OPENAI_API_KEY=ollama
      - SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL=phi3:mini
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: on-failure

volumes:
  postgres_data:
  ollama_data: